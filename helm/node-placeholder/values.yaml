replicaCount: 1

image:
  repository: 
    us-central1-docker.pkg.dev/cal-icor-hubs/core/node-placeholder-scaler
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.1-0.dev.git.400.hdbe1c2e"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: {}

nodeSelector: {}


affinity: {}

rbac:
  create: true

priorityClass:
  create: true


tolerations:

nodePoolSelectorKey: hub.jupyter.org/pool-name
placeholderPodLabelSelector: "app=node-placeholder-scaler,component=placeholder"
cpuThreshold: 0.2
memoryThreshold: 0.2
scalingStrategy: balanced # Options: cpu, mem, balanced (default)
calendarOverrideEnabled: False # Set to True to force the scaler to use calendar replica counts instead of config replica counts when calendar replica counts are greater than 0

# The URL of the public calendar to use for the node placeholder.
# calendarUrl:
#   https://url/of/the/public/calendar.ics
#
# This should be the timezone of the calendar. This is to normalize all day
# events, which don't have a timezone. If this is not set, the default timezone
# for all day events will be UTC, and not the timezone of the calendar.
# If not set, defaults to UTC
# calendarTimezone: "America/Los_Angeles"

# the following section should live in your deployment's values.yaml file
# and should be used to configure the node placeholder:
#
# node-placeholder-scaler:
#   image:
#     repository: 
#       host/and/path/to/node-placeholder-scaler/image
#     pullPolicy: IfNotPresent
#     # Overrides the image tag whose default is the chart appVersion.
#     tag: "tag.of.the.image"

#   # The URL of the public calendar to use for the node placeholder
#   calendarUrl: 
#     https://url/of/the/public/calendar.ics

#   nodePools:
#     <pool-name>:
#       nodeSelector:
#         hub.jupyter.org/pool-name: pool-name
#       resources:
#         requests:
#           # Some value slightly lower than allocatable RAM on the nodepool
#           # This is an example using a GCP n2-highmem-8 node with 64G of RAM allocatable
#           # calculate this value for your node pools with the determine_placeholder_pod_memory.py
#           # script located in the tools/ directory of the repo
#           memory: 60929654784
#       replicas: 0
